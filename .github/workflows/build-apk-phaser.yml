name: Build APK Phaser Port

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phaser_mobile_port

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: phaser_mobile_port/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qhome-phaser-apk
          path: phaser_mobile_port/android/app/build/outputs/apk/debug/app-debug.apk

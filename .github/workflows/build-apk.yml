name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          mv /root/.local/share/godot/export_templates/4.2.2.stable/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore /root/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          JAVA_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          ANDROID_PATH="${ANDROID_HOME:-/usr/lib/android-sdk}"
          cat > ~/.config/godot/editor_settings-4.tres << SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_PATH"
          export/android/java_sdk_path = "$JAVA_PATH"
          export/android/debug_keystore = "/root/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/qhome.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qhome-apk
          path: build/qhome.apk
          retention-days: 30


name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          DEST="$HOME/.local/share/godot/export_templates/4.2.2.stable"
          mkdir -p "$DEST"

          for SRC in \
            /root/.local/share/godot/export_templates/4.2.2.stable \
            /github/home/.local/share/godot/export_templates/4.2.2.stable
          do
            if [ -d "$SRC" ] && [ "$(realpath "$SRC")" != "$(realpath "$DEST")" ]; then
              cp -r "$SRC"/* "$DEST"/
            fi
          done

          ls -la "$DEST"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore "$HOME/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          JAVA_BIN="$(command -v java)"
          JAVA_PATH="$(dirname "$(dirname "$(readlink -f "$JAVA_BIN")")")"
          ANDROID_PATH="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/lib/android-sdk}}"

          if [ ! -d "$ANDROID_PATH" ]; then
            echo "Android SDK path not found: $ANDROID_PATH"
            exit 1
          fi

          cat > ~/.config/godot/editor_settings-4.tres <<SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_PATH"
          export/android/java_sdk_path = "$JAVA_PATH"
          export/android/debug_keystore = "$HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

          echo "Using Java at: $JAVA_PATH"
          echo "Using Android SDK at: $ANDROID_PATH"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --editor-settings ~/.config/godot/editor_settings-4.tres --export-debug "Android" build/qhome.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qhome-apk
          path: build/qhome.apk
          retention-days: 30


name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Android SDK build tools
        run: |
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found in container"
            exit 1
          fi

          ANDROID_PATH=""
          for CANDIDATE in \
            "${ANDROID_SDK_ROOT:-}" \
            "${ANDROID_HOME:-}" \
            /usr/lib/android-sdk \
            /opt/android-sdk \
            /github/home/android-sdk
          do
            if [ -n "$CANDIDATE" ] && [ -d "$CANDIDATE" ]; then
              ANDROID_PATH="$CANDIDATE"
              break
            fi
          done

          if [ -z "$ANDROID_PATH" ]; then
            echo "Could not detect Android SDK root"
            exit 1
          fi

          echo "ANDROID_PATH=$ANDROID_PATH" >> "$GITHUB_ENV"
          echo "Using SDK manager at: $SDKMANAGER"
          echo "Using Android SDK path: $ANDROID_PATH"
          "$SDKMANAGER" --sdk_root="$ANDROID_PATH" --version

          yes | "$SDKMANAGER" --sdk_root="$ANDROID_PATH" --licenses >/dev/null
          "$SDKMANAGER" --sdk_root="$ANDROID_PATH" --install \
            "platform-tools" \
            "platforms;android-33" \
            "platforms;android-34" \
            "platforms;android-35" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0"

      - name: Setup export templates
        run: |
          DEST="$HOME/.local/share/godot/export_templates/4.2.2.stable"
          mkdir -p "$DEST"

          if [ ! -f "$DEST/android_debug.apk" ]; then
            wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz -O /tmp/godot_templates.tpz
            unzip -q -o /tmp/godot_templates.tpz -d /tmp/godot_templates
            cp -r /tmp/godot_templates/templates/* "$DEST"/
          fi

          test -f "$DEST/android_debug.apk"
          test -f "$DEST/android_release.apk"
          ls -la "$DEST" | head -n 40

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore "$HOME/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          JAVA_BIN="$(command -v java)"
          JAVA_PATH="$(dirname "$(dirname "$(readlink -f "$JAVA_BIN")")")"
          ANDROID_PATH="${ANDROID_PATH}"

          if [ ! -d "$ANDROID_PATH" ]; then
            echo "Android SDK path not found: $ANDROID_PATH"
            exit 1
          fi

          ls -la "$ANDROID_PATH/build-tools" || true
          ls -la "$ANDROID_PATH/platforms" || true

          cat > ~/.config/godot/editor_settings-4.tres <<SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_PATH"
          export/android/java_sdk_path = "$JAVA_PATH"
          export/android/debug_keystore = "$HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

          echo "Using Java at: $JAVA_PATH"
          echo "Using Android SDK at: $ANDROID_PATH"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Build APK
        run: |
          mkdir -p build
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"$HOME/debug.keystore\"|" export_presets.cfg
          sed -i "s|keystore/debug_user=\"\"|keystore/debug_user=\"androiddebugkey\"|" export_presets.cfg
          sed -i "s|keystore/debug_password=\"\"|keystore/debug_password=\"android\"|" export_presets.cfg
          echo "--- export_presets.cfg ---"
          cat export_presets.cfg
          godot --headless --path . --verbose --editor-settings ~/.config/godot/editor_settings-4.tres --export-debug "Android" build/qhome.apk
          ls -la build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qhome-apk
          path: build/qhome.apk
          retention-days: 30


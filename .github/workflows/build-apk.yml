name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          mv /root/.local/share/godot/export_templates/4.2.2.stable/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/qhome.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qhome-apk
          path: build/qhome.apk
          retention-days: 30

